<svg xmlns="http://www.w3.org/2000/svg"
     width="24" height="24"
     viewBox="0 0 24 24">
  <!-- Define a mask: white = visible, black = cutout -->
  <mask id="arrow-mask">
    <!-- Full square visible -->
    <rect width="24" height="24" fill="white"/>
    <!-- Arrow shape cut out -->
    <path d="M14 16 L10 12 L14 8" 
          stroke="black" stroke-width="2" 
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </mask>

  <!-- Apply mask to colored square -->
  <rect width="18" height="18" x="3" y="3" rx="2"
        fill="#64748b" mask="url(#arrow-mask)"/>
</svg>